meters:
- name: donation_platform_fee
  description: Percentage fee charged on donation forms, donation pages, QuickDonate, and org-run peer-to-peer contributions (2.95% Standard, 1.75% Pro, 1.6% Premium).
  unit: percent_of_transaction
  aggregation: sum
  dimensions:
  - account
  - campaign
  - plan_tier
- name: ticketing_platform_fee
  description: Percentage fee charged on event ticketing, memberships, and supporter-run peer-to-peer transactions (3.95% Standard, 2% Pro/Premium).
  unit: percent_of_transaction
  aggregation: sum
  dimensions:
  - account
  - event
  - plan_tier
- name: payment_processor_fee
  description: Separate Stripe/PayPal processing fee charged on the same transaction (e.g. ~2.2% + $0.30 for card payments via Stripe), independent of Donorbox's own platform fee.
  unit: percent_plus_fixed
  aggregation: sum
  dimensions:
  - account
  - processor
- name: plan_subscription
  description: Monthly or annual subscription fee for the Pro ($150/month) or Premium (custom) plan tier, which also gates API and Zapier access.
  unit: month
  aggregation: sum
  dimensions:
  - account
- name: addon_fees
  description: Optional add-ons such as Text-to-Give ($19-$50/month) and Donorbox Live Kiosk ($15-$820/month or year depending on tier and device count).
  unit: month
  aggregation: sum
  dimensions:
  - account
  - addon
principles:
- name: Visibility
  description: Track platform-fee percentage and processor-fee percentage separately per transaction type (donation vs. ticketing vs. membership) to see true effective cost per dollar raised.
- name: Allocation
  description: Attribute platform and processor fees to individual campaigns/events via the Campaigns, Donations, and Events API resources so program teams see net (post-fee) revenue.
- name: Optimization
  description: Model the break-even point between staying on Standard (0% subscription, higher fee%) versus upgrading to Pro/Premium (fixed subscription, lower fee%) based on monthly donation volume; encourage ACH/bank transfer where supported to reduce card-processing fees.
- name: Accountability
  description: Assign a finance owner to reconcile monthly Donorbox payouts against the Donations API export, accounting for both the platform fee and the processor fee per transaction.
