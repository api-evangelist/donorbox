description: >-
  FinOps view of Donorbox spend for a nonprofit organization. There is no
  metered cost tied to API calls themselves - the API is either bundled into
  the Pro/Premium monthly subscription or (per older documentation) a flat
  $17/month add-on. The dominant, variable cost driver is instead the
  platform fee charged as a percentage of each donation, ticket sale,
  membership payment, or peer-to-peer contribution processed through
  Donorbox, layered on top of the separate Stripe/PayPal payment-processing
  fee for the same transaction. Higher-tier plans trade a fixed monthly
  subscription for a lower percentage fee, which becomes cost-effective once
  transaction volume is high enough.
notes: >-
  Reconcile actual per-transaction platform-fee and processor-fee rates
  against your live Donorbox account, since published ranges vary by product
  (donation forms vs. ticketing/memberships/peer-to-peer) and by payment
  processor. The $17/month legacy API add-on figure from the GitHub README
  was not confirmed against current billing.
