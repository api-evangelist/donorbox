  name: Donorbox Campaigns API
  tags:
  - Campaigns
  - Fundraising
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://github.com/donorbox/donorbox-api/blob/master/README.md#campaigns
