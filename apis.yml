    type: OpenAPI
  - url: collections/donorbox.postman_collection.json
    type: Postman
  - url: collections/donorbox.opencollection.json
    type: OpenCollection
  description: Read-only access to an organization's donations, including campaign,
    donor, amount, currency, status, donation type (Stripe or PayPal), UTM attribution,
    processing fee, and custom question/answer fields collected on the donation form.
    Filterable by email, donor, campaign, id, date range, and amount range.
