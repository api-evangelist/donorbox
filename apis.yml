aid: donorbox
url: https://raw.githubusercontent.com/api-evangelist/donorbox/refs/heads/main/apis.yml
name: Donorbox
kind: company
description: Donorbox is an online donation and fundraising platform for nonprofits,
  offering branded donation forms, recurring giving, peer-to-peer campaigns, event
  ticketing, memberships, and text-to-give. Its REST API (an add-on available on
  Pro and Premium plans) exposes read-only access to Campaigns, Donations, Plans
  (recurring donation subscriptions), Donors, Events, Tickets, and Ticket Purchases,
  authenticated with HTTP Basic Auth using an organization email and API key, with
  custom webhooks available as an alternative to polling.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Nonprofit
- Fundraising
- Donations
- Payments
- Recurring Giving
- Event Ticketing
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
apis:
